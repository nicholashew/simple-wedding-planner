<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Midnight Feast 🐈‍⬛</title>
  <link rel="stylesheet" href="assets/css/gw.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { padding-top: 60px; background: var(--bg); }

    /* ── GAME NAV ── */
    .game-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px;
      height: 58px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 2px 8px rgba(0,0,0,.1);
    }
    .nav-back {
      display: flex; align-items: center; gap: 8px;
      text-decoration: none; color: var(--accent-dk);
      font-size: 14px; font-weight: 500;
      padding: 6px 10px; border-radius: 8px;
      transition: background .15s;
    }
    .nav-back:hover { background: var(--accent-lt); }
    .nav-back i { font-size: 11px; }
    .game-nav-title {
      font-family: Georgia, serif; font-size: 17px;
      color: var(--accent-dk); font-style: italic;
    }
    .nav-restart {
      background: none; border: none; cursor: pointer;
      width: 38px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 16px;
      border-radius: 8px; transition: background .15s, color .15s;
    }
    .nav-restart:hover { background: var(--accent-lt); color: var(--accent-dk); }

    /* ── DIFFICULTY TABS ── */
    .diff-tabs {
      display: flex; gap: 8px; justify-content: center;
      padding: 14px 16px 0;
    }
    .diff-tab {
      flex: 1; max-width: 100px;
      padding: 7px 0; border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--surface); color: var(--muted);
      font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all .2s;
    }
    .diff-tab.active {
      border-color: var(--accent); background: var(--accent-lt);
      color: var(--accent-dk); font-weight: 600;
    }

    /* ── STATS BAR ── */
    .game-stats {
      display: flex; justify-content: center; gap: 28px;
      padding: 10px 16px 0;
      font-size: 13px; color: var(--text);
    }
    .stat { display: flex; align-items: center; gap: 6px; }
    .stat i { color: var(--accent); font-size: 13px; }
    .stat span { font-weight: 600; min-width: 24px; }

    /* ── CARD TABLE ── */
    #card-grid { padding: 0 16px; }
    .card-table {
      table-layout: fixed;
      border-collapse: separate;
      border-spacing: 8px;
      margin: 14px auto 0;
    }
    .card-table td { padding: 0; vertical-align: top; width: 60px; }

    /* ── CARD FLIP ── */
    .card {
      position: relative;
      width: 60px;
      padding-bottom: 150%;   /* 90px tall — 2:3 playing-card ratio */
      perspective: 900px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .card-inner {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
      transition: transform .42s cubic-bezier(.4,0,.2,1);
    }
    .card.flipped .card-inner,
    .card.matched .card-inner { transform: rotateY(180deg); }

    .card-back, .card-face {
      position: absolute; inset: 0;
      border-radius: 12px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 4px;
      user-select: none;
    }

    /* Face-down side — clean white playing-card style */
    .card-back {
      background: #fff;
      border: 2px solid #d0d0d0;
      box-shadow: 0 2px 8px rgba(0,0,0,.10);
      font-size: 28px;
    }

    /* Face-up side — content */
    .card-face {
      transform: rotateY(180deg);
      background: var(--surface);
      border: 2px solid var(--border);
      box-shadow: 0 3px 10px rgba(0,0,0,.08);
      font-size: 26px;
    }
    .card-label {
      font-size: 8px; color: var(--muted);
      text-align: center; padding: 0 4px;
      line-height: 1.2; max-width: 100%;
      overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Hover — only on unmatched, face-down cards */
    .card:not(.matched):not(.flipped):hover .card-back {
      border-color: var(--accent);
      box-shadow: 0 4px 14px rgba(0,0,0,.15);
    }

    /* Matched glow */
    .card.matched .card-face {
      border-color: var(--gold);
      background: #fffdf0;
      box-shadow: 0 0 14px rgba(200,168,74,.3);
    }
    @keyframes matchGlow {
      0%   { box-shadow: 0 0 0   rgba(200,168,74,0); }
      45%  { box-shadow: 0 0 20px rgba(200,168,74,.55); }
      100% { box-shadow: 0 0 10px rgba(200,168,74,.2); }
    }
    .card.matched .card-face { animation: matchGlow .5s ease forwards; }

    /* Wrong-flip shake */
    @keyframes shake {
      0%,100% { transform: rotateY(180deg) translateX(0); }
      25%      { transform: rotateY(180deg) translateX(-5px); }
      75%      { transform: rotateY(180deg) translateX(5px); }
    }
    .card.wrong .card-inner { animation: shake .35s ease; }

    /* ── GAME CONTROLS ── */
    .game-controls {
      display: flex; justify-content: center;
      padding: 14px 0 28px;
    }
    .btn-reset {
      padding: 8px 22px;
      border: 1.5px solid var(--border); background: none;
      border-radius: 20px; font-size: 13px; color: var(--muted);
      cursor: pointer; display: flex; align-items: center; gap: 7px;
      transition: all .2s;
    }
    .btn-reset:hover { border-color: var(--accent); color: var(--accent-dk); }

    /* ── WIN OVERLAY ── */
    #win-overlay {
      display: none; position: fixed; inset: 0; z-index: 400;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
      align-items: center; justify-content: center; padding: 20px;
    }
    #win-overlay.open { display: flex; }

    .win-card {
      background: var(--surface);
      border-radius: 22px; padding: 28px 22px 24px;
      max-width: 310px; width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
      animation: winPop .4s cubic-bezier(.34,1.56,.64,1) forwards;
    }
    @keyframes winPop {
      from { transform: scale(.8); opacity: 0; }
      to   { transform: scale(1);  opacity: 1; }
    }
    .win-cat { font-size: 60px; line-height: 1; margin-bottom: 10px; }
    .win-title {
      font-family: Georgia, serif; font-size: 22px;
      color: var(--accent-dk); margin: 0 0 4px;
    }
    .win-subtitle { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
    .win-stats {
      display: flex; justify-content: center; gap: 20px;
      font-size: 13px; color: var(--text);
      background: var(--bg); border-radius: 10px;
      padding: 10px 16px; margin-bottom: 16px;
    }
    .win-stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .win-stat-val { font-size: 20px; font-weight: 700; color: var(--accent-dk); }
    .win-stat-lbl { font-size: 11px; color: var(--muted); }
    .win-fortune {
      background: var(--accent-lt);
      border: 1.5px solid var(--accent);
      border-radius: 12px; padding: 14px 16px;
      font-size: 13.5px; color: var(--accent-dk);
      font-style: italic; line-height: 1.55;
      margin-bottom: 20px; text-align: left;
    }
    .win-fortune-label {
      display: block; font-size: 10px; font-style: normal;
      font-weight: 700; color: var(--accent);
      text-transform: uppercase; letter-spacing: 0.6px;
      margin-bottom: 6px;
    }
    .btn-play-again {
      width: 100%; padding: 13px;
      background: var(--accent); color: #fff;
      border: none; border-radius: 12px;
      font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background .2s, transform .1s;
    }
    .btn-play-again:hover  { background: var(--accent-dk); }
    .btn-play-again:active { transform: scale(.97); }

    /* ── FAMILY BADGE on card ── */
    .card-family-dot {
      width: 5px; height: 5px; border-radius: 50%;
      position: absolute; top: 6px; right: 6px;
    }
    .dot-cat     { background: #c8799a; }
    .dot-food    { background: #c8a84a; }
    .dot-wedding { background: #7099c8; }
  </style>
</head>
<body>

<!-- ── GAME NAV ── -->
<nav class="game-nav">
  <a class="nav-back" href="index.html">
    <i class="fa-solid fa-chevron-left"></i> <span id="nav-couple-name"></span>
  </a>
  <div class="game-nav-title">🐈‍⬛ Midnight Feast</div>
  <button class="nav-restart" id="navRestartBtn" title="Restart game">
    <i class="fa-solid fa-rotate-right"></i>
  </button>
</nav>

<!-- ── DIFFICULTY TABS ── -->
<div class="diff-tabs">
  <button class="diff-tab active" data-diff="easy">Easy</button>
  <button class="diff-tab"        data-diff="normal">Normal</button>
  <button class="diff-tab"        data-diff="hard">Hard</button>
</div>

<!-- ── STATS ── -->
<div class="game-stats">
  <div class="stat"><i class="fa-solid fa-hand-pointer"></i> <span id="stat-moves">0</span> moves</div>
  <div class="stat"><i class="fa-regular fa-clock"></i> <span id="stat-time">0:00</span></div>
  <div class="stat"><i class="fa-solid fa-circle-check"></i> <span id="stat-matched">0</span>/<span id="stat-total">0</span></div>
</div>

<!-- ── CARD GRID ── -->
<div class="card-grid" id="card-grid"></div>

<!-- ── BOTTOM RESET ── -->
<div class="game-controls">
  <button class="btn-reset" id="resetBtn">
    <i class="fa-solid fa-shuffle"></i> Shuffle &amp; Restart
  </button>
</div>

<!-- ── WIN OVERLAY ── -->
<div id="win-overlay">
  <div class="win-card">
    <div class="win-cat">😴🐈‍⬛</div>
    <div class="win-title">Well Fed!</div>
    <div class="win-subtitle">The midnight cat is satisfied 🐾</div>
    <div class="win-stats">
      <div class="win-stat">
        <div class="win-stat-val" id="win-moves">—</div>
        <div class="win-stat-lbl">Moves</div>
      </div>
      <div class="win-stat">
        <div class="win-stat-val" id="win-time">—</div>
        <div class="win-stat-lbl">Time</div>
      </div>
      <div class="win-stat">
        <div class="win-stat-val" id="win-pairs">—</div>
        <div class="win-stat-lbl">Pairs</div>
      </div>
    </div>
    <div class="win-fortune">
      <span class="win-fortune-label">🔮 Your Lucky Fortune</span>
      <span id="win-fortune-text"></span>
    </div>
    <button class="btn-play-again" id="playAgainBtn">Play Again</button>
  </div>
</div>

<script src="assets/js/gw.js"></script>
<script>
/* ── DATA ── */
const CARD_POOL = [
  // Black cat moods
  { id: 'cat1', emoji: '🐱',   label: 'Curious',   family: 'cat' },
  { id: 'cat2', emoji: '😸',   label: 'Happy',     family: 'cat' },
  { id: 'cat3', emoji: '😼',   label: 'Sneaky',    family: 'cat' },
  { id: 'cat4', emoji: '🙀',   label: 'Shocked',   family: 'cat' },
  { id: 'cat5', emoji: '😻',   label: 'Smitten',   family: 'cat' },
  { id: 'cat6', emoji: '😺',   label: 'Greeting',  family: 'cat' },
  // Banquet dishes (mirror the wedding menu)
  { id: 'food1', emoji: '🦈',  label: "Shark's Fin",    family: 'food' },
  { id: 'food2', emoji: '🦆',  label: 'Roast Duck',     family: 'food' },
  { id: 'food3', emoji: '🐟',  label: 'Steamed Fish',   family: 'food' },
  { id: 'food4', emoji: '🦐',  label: 'Butter Prawns',  family: 'food' },
  { id: 'food5', emoji: '🍚',  label: 'Lotus Rice',     family: 'food' },
  { id: 'food6', emoji: '🍮',  label: 'Snow Jelly',     family: 'food' },
  // Wedding symbols
  { id: 'wed1', emoji: '💍',   label: 'Rings',        family: 'wedding' },
  { id: 'wed2', emoji: '💐',   label: 'Bouquet',      family: 'wedding' },
  { id: 'wed3', emoji: '🥂',   label: 'Cheers',       family: 'wedding' },
  { id: 'wed4', emoji: '🎂',   label: 'Wedding Cake', family: 'wedding' },
  { id: 'wed5', emoji: '🧧',   label: 'Red Packet',   family: 'wedding' },
  { id: 'wed6', emoji: '🏮',   label: 'Lantern',      family: 'wedding' },
];

const FORTUNES = [
  "Like a cat with nine lives, may your love be endlessly resilient. 💕",
  "May your home always be full of laughter — and maybe a cat or two. 🐱",
  "The best things in life: good food, great company, and someone who loves you. 🍽️",
  "May your marriage be as cosy as a cat nap in the afternoon sun. ☀️",
  "Tonight the black cat brought luck — may love bring you luck always. 🖤",
  "May every meal you share together taste better than the last. 🥂",
  "A home filled with love is a home worth purring about. 🏠",
  "Tonight you celebrate love. Tomorrow, the adventure begins. 🌙",
  "Like the cat who always lands on its feet, may you always find your way back to each other. 🐾",
];

const DIFF_CONFIG = {
  easy:   { pairs: 6,  cols: 4 },  // 4×3
  normal: { pairs: 8,  cols: 4 },  // 4×4
  hard:   { pairs: 10, cols: 5 },  // 5×4
};

/* ── STATE ── */
let difficulty  = 'easy';
let deck        = [];
let flipped     = [];   // deck indices currently face-up (max 2)
let matched     = new Set(); // deck indices confirmed matched
let moves       = 0;
let startTime   = null;
let timerInterval = null;
let canFlip     = true;

/* ── UTILS ── */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function fmtTime(ms) {
  const s = Math.floor(ms / 1000);
  return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
}

/* ── GAME LOGIC ── */
function buildDeck(pairs) {
  const pool = shuffle(CARD_POOL).slice(0, pairs);
  const doubled = [];
  pool.forEach(c => {
    doubled.push({ ...c, idx: doubled.length });
    doubled.push({ ...c, idx: doubled.length });
  });
  return shuffle(doubled);
}

function startGame() {
  const { pairs, cols } = DIFF_CONFIG[difficulty];
  deck    = buildDeck(pairs);
  flipped = [];
  matched = new Set();
  moves   = 0;
  canFlip = true;
  clearInterval(timerInterval);
  startTime = null;

  updateStats();
  renderGrid();
  document.getElementById('win-overlay').classList.remove('open');
}

function renderGrid() {
  const grid = document.getElementById('card-grid');
  const { cols } = DIFF_CONFIG[difficulty];
  const dotClass = { cat: 'dot-cat', food: 'dot-food', wedding: 'dot-wedding' };

  const cardCell = (card, i) => `
    <td><div class="card" data-index="${i}">
      <div class="card-inner">
        <div class="card-back">🐈‍⬛</div>
        <div class="card-face">
          <div class="card-family-dot ${dotClass[card.family]}"></div>
          <span>${card.emoji}</span>
          <span class="card-label">${card.label}</span>
        </div>
      </div>
    </div></td>`;

  let rows = '';
  for (let r = 0; r < deck.length; r += cols) {
    const cells = deck.slice(r, r + cols).map((card, c) => cardCell(card, r + c)).join('');
    // pad last row with empty cells so columns stay equal-width
    const empty = '<td></td>'.repeat(cols - deck.slice(r, r + cols).length);
    rows += `<tr>${cells}${empty}</tr>`;
  }

  grid.innerHTML = `<table class="card-table"><tbody>${rows}</tbody></table>`;

  grid.querySelectorAll('.card').forEach(el => {
    el.addEventListener('click', () => flipCard(+el.dataset.index));
  });
}

function flipCard(i) {
  if (!canFlip)         return;
  if (flipped.includes(i)) return;
  if (matched.has(i))   return;

  // Start timer on first flip
  if (!startTime) {
    startTime = Date.now();
    timerInterval = setInterval(updateTimer, 500);
  }

  const el = cardEl(i);
  el.classList.add('flipped');
  flipped.push(i);

  if (flipped.length === 2) {
    moves++;
    updateStats();
    canFlip = false;
    checkMatch();
  }
}

function checkMatch() {
  const [a, b] = flipped;

  if (deck[a].id === deck[b].id) {
    // ✅ Matched
    setTimeout(() => {
      matched.add(a);
      matched.add(b);
      cardEl(a).classList.add('matched');
      cardEl(b).classList.add('matched');
      flipped = [];
      canFlip = true;
      updateStats();

      if (matched.size === deck.length) {
        clearInterval(timerInterval);
        setTimeout(showWin, 500);
      }
    }, 300);

  } else {
    // ❌ No match — shake then flip back
    setTimeout(() => {
      cardEl(a).classList.add('wrong');
      cardEl(b).classList.add('wrong');
    }, 100);

    setTimeout(() => {
      cardEl(a).classList.remove('flipped', 'wrong');
      cardEl(b).classList.remove('flipped', 'wrong');
      flipped = [];
      canFlip = true;
    }, 950);
  }
}

function showWin() {
  const elapsed = startTime ? Date.now() - startTime : 0;
  document.getElementById('win-moves').textContent = moves;
  document.getElementById('win-time').textContent  = fmtTime(elapsed);
  document.getElementById('win-pairs').textContent = deck.length / 2;
  document.getElementById('win-fortune-text').textContent =
    FORTUNES[Math.floor(Math.random() * FORTUNES.length)];
  document.getElementById('win-overlay').classList.add('open');
}

/* ── UI HELPERS ── */
function cardEl(i) {
  return document.querySelector(`.card[data-index="${i}"]`);
}

function updateStats() {
  document.getElementById('stat-moves').textContent   = moves;
  document.getElementById('stat-matched').textContent = matched.size / 2;
  document.getElementById('stat-total').textContent   = deck.length / 2;
}

function updateTimer() {
  if (!startTime) return;
  document.getElementById('stat-time').textContent = fmtTime(Date.now() - startTime);
}

/* ── CONTROLS ── */
document.querySelectorAll('.diff-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    difficulty = btn.dataset.diff;
    startGame();
  });
});

document.getElementById('resetBtn').addEventListener('click', startGame);
document.getElementById('navRestartBtn').addEventListener('click', startGame);
document.getElementById('playAgainBtn').addEventListener('click', () => {
  document.getElementById('win-overlay').classList.remove('open');
  startGame();
});

// Close win overlay on backdrop tap
document.getElementById('win-overlay').addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('open');
});

/* ── INIT ── */
document.addEventListener('DOMContentLoaded', async () => {
  try {
    const { config } = await GW.loadData();
    const name = config.projectName || 'Our Wedding';
    document.getElementById('nav-couple-name').textContent = name;
    document.title = `Midnight Feast 🐈‍⬛ · ${name}`;
  } catch (_) {}
  startGame();
});
</script>
</body>
</html>
