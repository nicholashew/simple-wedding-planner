<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find My Table</title>
  <link rel="stylesheet" href="assets/css/gw.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { padding-top: 65px; }
    /* ── TOP NAV ── */
    .top-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 2px 8px rgba(0,0,0,.16);
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; }
    .nav-logo img { height: 38px; width: 38px; flex-shrink: 0; }
    .nav-logo-name {
      font-family: Georgia, serif; font-size: 17px;
      color: var(--accent-dk); font-style: italic; letter-spacing: 0.3px;
    }
    .hamburger-btn {
      background: none; border: none; cursor: pointer;
      width: 40px; height: 40px;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 5px; padding: 4px;
      border-radius: 8px; transition: background .15s;
    }
    .hamburger-btn:hover { background: var(--accent-lt); }
    .hamburger-btn span {
      display: block; width: 22px; height: 2px;
      background: var(--text); border-radius: 2px; transition: all .25s ease;
    }
    .hamburger-btn.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger-btn.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .hamburger-btn.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    .nav-drawer {
      position: fixed; top: 0; right: -290px; bottom: 0;
      width: 270px; z-index: 200; background: var(--surface);
      border-left: 1px solid var(--border);
      box-shadow: -4px 0 24px rgba(0,0,0,.12);
      transition: right .28s cubic-bezier(.4,0,.2,1);
      display: flex; flex-direction: column; padding: 20px 0 32px;
    }
    .nav-drawer.open {
      right: 0;
      background:
        linear-gradient(rgba(255,255,255,0.60), rgba(255,255,255,0.60)),
        url('assets/data/floral-background.jpg');
      background-size: auto, contain; background-repeat: repeat, repeat;
    }
    .nav-drawer-close {
      position: absolute; top: 14px; right: 20px;
      background: none; border: none; cursor: pointer;
      width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
      font-size: 22px; color: var(--muted); padding: 4px; line-height: 1; border-radius: 8px;
      transition: background .15s;
    }
    .nav-drawer-close:hover { background: var(--accent-lt); color: var(--text); }
    .nav-drawer-header { padding: 0 24px 16px; border-bottom: 1px solid var(--border); }
    .nav-drawer-brand { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .nav-drawer-brand img { height: 36px; width: 36px; flex-shrink: 0; }
    .nav-drawer-title {
      font-family: Georgia, serif; font-size: 17px; font-style: italic; color: var(--accent-dk);
    }
    .nav-drawer-lang { display: flex; gap: 8px; }
    .nav-drawer a {
      display: flex; align-items: center; gap: 14px;
      padding: 15px 24px; text-decoration: none;
      color: var(--text); font-size: 15px; font-weight: 500;
      border-bottom: 1px solid var(--border); transition: background .12s, color .12s;
    }
    .nav-drawer a:hover { background: var(--accent-lt); color: var(--accent-dk); }
    .nav-drawer a i { width: 20px; text-align: center; color: var(--accent); font-size: 16px; }
    .nav-overlay {
      display: none; position: fixed; inset: 0; z-index: 150; background: rgba(0,0,0,.3);
    }
    .nav-overlay.open { display: block; }
    /* ── Upload screen */
    .upload-area {
      border: 2.5px dashed rgba(200,168,74,0.5);
      border-radius: 18px; padding: 40px 24px;
      text-align: center; cursor: pointer;
      background: rgba(255,255,255,0.55);
      transition: border-color .2s, background .2s;
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      margin-bottom: 16px;
    }
    .upload-area:hover, .upload-area.drag-over {
      border-color: var(--gold); background: rgba(255,248,230,0.7);
    }
    .upload-icon {
      display: flex; align-items: center; justify-content: center;
      width: 80px; height: 80px; margin: 0 auto 16px; color: var(--gold);
      background:
        linear-gradient(var(--gold), var(--gold)) 0 0 / 22px 3px no-repeat,
        linear-gradient(var(--gold), var(--gold)) 0 0 / 3px 22px no-repeat,
        linear-gradient(var(--gold), var(--gold)) 100% 0 / 22px 3px no-repeat,
        linear-gradient(var(--gold), var(--gold)) 100% 0 / 3px 22px no-repeat,
        linear-gradient(var(--gold), var(--gold)) 0 100% / 22px 3px no-repeat,
        linear-gradient(var(--gold), var(--gold)) 0 100% / 3px 22px no-repeat,
        linear-gradient(var(--gold), var(--gold)) 100% 100% / 22px 3px no-repeat,
        linear-gradient(var(--gold), var(--gold)) 100% 100% / 3px 22px no-repeat;
    }
    .upload-icon i { font-size: 40px; }
    .qr-scan-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 22px; height: 22px; flex-shrink: 0;
      background:
        linear-gradient(currentColor, currentColor) 0 0 / 6px 2px no-repeat,
        linear-gradient(currentColor, currentColor) 0 0 / 2px 6px no-repeat,
        linear-gradient(currentColor, currentColor) 100% 0 / 6px 2px no-repeat,
        linear-gradient(currentColor, currentColor) 100% 0 / 2px 6px no-repeat,
        linear-gradient(currentColor, currentColor) 0 100% / 6px 2px no-repeat,
        linear-gradient(currentColor, currentColor) 0 100% / 2px 6px no-repeat,
        linear-gradient(currentColor, currentColor) 100% 100% / 6px 2px no-repeat,
        linear-gradient(currentColor, currentColor) 100% 100% / 2px 6px no-repeat;
    }
    .qr-scan-icon i { font-size: 11px; }
    .upload-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .upload-sub   { font-size: 13px; color: var(--muted); }
    #file-input   { display: none; }

    .or-divider {
      text-align: center; color: var(--muted); font-size: 13px;
      margin: 12px 0; position: relative;
    }
    .or-divider::before, .or-divider::after {
      content: ''; position: absolute; top: 50%;
      width: calc(50% - 24px); height: 1px; background: var(--border);
    }
    .or-divider::before { left: 0; }
    .or-divider::after  { right: 0; }

    /* ── Result screen */
    #result-screen { display: none; }

    .welcome-banner {
      background: rgba(255,255,255,0.75);
      border: 1.5px solid rgba(200,168,74,0.4);
      border-radius: 18px; padding: 20px 20px 16px; text-align: center;
      margin-bottom: 16px;
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    }
    .welcome-banner > h2 {
      font-family: Georgia, serif; font-size: 22px; font-weight: 400;
      color: var(--text); margin-bottom: 12px;
    }
    .viz-intro { border-top: 1px solid rgba(200,168,74,0.25); padding-top: 12px; }
    .viz-intro h2 {
      font-family: Georgia, serif; font-size: 17px; font-weight: 600;
      color: var(--accent-dk); margin-bottom: 3px;
    }
    .viz-intro p { font-size: 13px; color: var(--text2); line-height: 1.5; }
    .viz-seat-note {
      margin-top: 7px; font-size: 12px; color: var(--muted);
      background: rgba(200,168,74,0.07); border-radius: 8px;
      padding: 6px 10px; border-left: 3px solid rgba(200,168,74,0.4);
    }

    /* ── Table viz blocks */
    .viz-table-block {
      background: rgba(255,255,255,0.85); border-radius: 14px;
      border: 1px solid var(--border); margin-bottom: 14px; overflow: hidden;
      box-shadow: 0 1px 8px rgba(0,0,0,.05);
    }
    .viz-table-header { display: flex; align-items: center; gap: 12px; padding: 14px 16px; }
    .viz-table-color-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .viz-table-header-text { flex: 1; }
    .viz-table-title    { font-size: 16px; font-weight: 700; }
    .viz-table-subtitle { font-size: 12px; color: var(--muted); margin-top: 1px; }
    .viz-table-body     { padding: 0 16px 16px; }

    /* ── SVG accordion (default hidden, toggle to expand) */
    .viz-svg-toggle {
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 9px 16px; margin-bottom: 12px;
      background: var(--accent-lt); border: 1px solid rgba(200,168,74,0.3);
      border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 600;
      color: var(--accent-dk); font-family: inherit; transition: background .15s;
    }
    .viz-svg-toggle:hover { background: rgba(200,168,74,0.15); }
    .viz-svg-chevron { transition: transform .2s; display: inline-block; line-height: 1; }
    .viz-svg-accordion.open .viz-svg-chevron { transform: rotate(180deg); }
    .viz-svg-wrap { display: none; text-align: center; margin: 0 auto 12px; overflow: visible; }
    .viz-svg-accordion.open .viz-svg-wrap { display: block; }

    /* ── Global seating plan toggle */
    .viz-all-toggle {
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px 16px; margin-bottom: 14px;
      background: rgba(255,255,255,0.7); border: 1.5px solid rgba(200,168,74,0.4);
      border-radius: 12px; cursor: pointer; font-size: 13px; font-weight: 600;
      color: var(--accent-dk); font-family: inherit; transition: background .15s;
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    }
    .viz-all-toggle:hover { background: rgba(255,248,230,0.85); }
    .viz-all-toggle .viz-svg-chevron { transition: transform .2s; display: inline-block; line-height: 1; }
    .viz-all-toggle.open .viz-svg-chevron { transform: rotate(180deg); }

    /* ── Guest cards */
    .viz-guest-cards { display: flex; flex-direction: column; gap: 8px; }
    .viz-guest-card  {
      background: var(--bg); border-radius: 10px; border: 1px solid var(--border);
      padding: 12px 14px; display: flex; align-items: center; gap: 12px;
    }
    .viz-seat-circle {
      width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; font-weight: 800; color: #fff;
    }
    .viz-guest-info { flex: 1; min-width: 0; }
    .viz-guest-name { font-size: 16px; font-weight: 600; }
    .viz-guest-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .viz-guest-lead { font-size: 12px; font-weight: 700; color: var(--accent-dk); flex-shrink: 0; text-align: right; }
    .viz-guest-other{ font-size: 12px; color: var(--muted); opacity: .65; flex-shrink: 0; text-align: right; }

    /* ── Seat tooltip overlay */
    #seat-tooltip { display: none; position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,.5); align-items: center; justify-content: center; }
    #seat-tooltip.visible { display: flex; }
    #seat-tooltip-inner {
      background: #fff; border-radius: 20px; padding: 28px 24px;
      min-width: 240px; max-width: 320px; text-align: center;
      position: relative; box-shadow: 0 12px 48px rgba(0,0,0,.22);
      animation: popIn .18s ease;
    }
    @keyframes popIn { from { transform: scale(.88); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    #tt-seat-badge {
      width: 60px; height: 60px; border-radius: 50%; margin: 0 auto 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 800; color: #fff;
    }
    #tt-guest-name { font-size: 20px; font-weight: 700; color: var(--text); line-height: 1.25; margin-bottom: 4px; }
    #tt-guest-meta { font-size: 13px; color: var(--text2); margin-bottom: 3px; }
    #tt-seat-label { font-size: 12px; color: var(--muted); }
    #tt-close {
      position: absolute; top: 12px; right: 14px;
      background: none; border: none; font-size: 22px; color: var(--muted); cursor: pointer; line-height: 1;
    }

    /* ── Error state */
    .error-box {
      background: #fff8e8; border: 1.5px solid var(--gold);
      border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 16px;
    }
    .error-box .error-icon { font-size: 32px; display: block; margin-bottom: 8px; }
    .error-box p { font-size: 14px; color: var(--text2); }
  </style>
</head>

<!-- jsQR for QR decoding -->
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<script src="assets/js/gw.js"></script>
<script>
let guestData = [], configData = null, categories = [];
let cameraStream = null;
let scanAnimFrame = null;

// ── Init
document.addEventListener('DOMContentLoaded', async () => {
  try {
    const { config, guests } = await GW.loadData();
    configData = config;
    guestData  = guests;
    categories = config._categories || [];
    GW.applyConfig();
    const name = config.projectName || '';
    document.getElementById('nav-couple-name').textContent = name;
    document.getElementById('drawer-couple-name').textContent = name;
    const footerEl = document.getElementById('gw-footer-names');
    if (footerEl) {
      const year = config.eventDate ? new Date(config.eventDate).getFullYear() : new Date().getFullYear();
      footerEl.textContent = `© ${year} ${name}`;
    }
  } catch (e) {
    console.warn('Could not load data:', e);
    showError(GW.t('dataLoadError'));
  }

  // Check URL param ?qr=...
  const params = new URLSearchParams(location.search);
  const qrParam = params.get('qr');
  if (qrParam) {
    const payload = decodeQrPayload(qrParam);
    if (payload) showResult(payload);
  }

  // Wire file inputs (gallery + camera capture)
  document.getElementById('file-input').addEventListener('change', handleFileUpload);
  document.getElementById('file-input-camera').addEventListener('change', handleFileUpload);

  // Drag & drop
  const area = document.getElementById('upload-area');
  area.addEventListener('dragover', e => { e.preventDefault(); area.classList.add('drag-over'); });
  area.addEventListener('dragleave', () => area.classList.remove('drag-over'));
  area.addEventListener('drop', e => {
    e.preventDefault(); area.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) processImageFile(file);
  });
});

// ── File upload handler
function handleFileUpload(e) {
  const file = e.target.files[0];
  if (file) processImageFile(file);
  e.target.value = '';
}

function processImageFile(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width  = img.width;
      canvas.height = img.height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(imageData.data, imageData.width, imageData.height);
      if (code) {
        handleQrData(code.data);
      } else {
        showError('Could not read QR code. Make sure the image is clear and try again.');
      }
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

// ── Camera scanning
function startCamera() {
  const section = document.getElementById('camera-section');
  const video   = document.getElementById('camera-video');
  section.style.display = 'block';
  hideError();
  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
    .then(stream => {
      cameraStream = stream;
      video.srcObject = stream;
      video.play();
      scanFrame(video);
    })
    .catch(() => showError('Camera access denied. Please use the upload option instead.'));
}

function stopCamera() {
  if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
  cancelAnimationFrame(scanAnimFrame);
  document.getElementById('camera-section').style.display = 'none';
  document.getElementById('camera-video').srcObject = null;
}

function scanFrame(video) {
  if (!cameraStream) return;
  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    const canvas = document.createElement('canvas');
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    const imageData = canvas.getContext('2d').getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, imageData.width, imageData.height);
    if (code) { stopCamera(); handleQrData(code.data); return; }
  }
  scanAnimFrame = requestAnimationFrame(() => scanFrame(video));
}

// ── Unicode-safe base64 decode (handles non-ASCII subCat values e.g. Chinese)
function b64DecodeJson(str) {
  try {
    const bin = atob(str);
    const bytes = Uint8Array.from(bin, c => c.charCodeAt(0));
    return JSON.parse(new TextDecoder().decode(bytes));
  } catch {}
  try { return JSON.parse(atob(str)); } catch {}
  return null;
}

// ── Decode QR payload — handles Mode 1 (ID-array), Mode 2 (single group), Mode 3 (multi-group)
function decodeQrPayload(encoded) {
  const decoded = b64DecodeJson(encoded);
  if (!decoded) return null;
  if (Array.isArray(decoded) && decoded.length)
    return { type: 'ids', ids: decoded, leadId: decoded[0] };
  if (decoded.v === 2 && decoded.cat)
    return { type: 'group', groups: [{ cat: decoded.cat, subCat: decoded.subCat || null }], leadId: decoded.lead || null };
  if (decoded.v === 3 && Array.isArray(decoded.groups) && decoded.groups.length)
    return { type: 'group', groups: decoded.groups, leadId: decoded.lead || null };
  return null;
}

// ── QR data handler
function handleQrData(raw) {
  let payload = null;
  try {
    const url = new URL(raw, location.href);
    const qrParam = url.searchParams.get('qr');
    if (qrParam) payload = decodeQrPayload(qrParam);
  } catch {}
  if (!payload) payload = decodeQrPayload(raw);
  // Legacy: raw is plain JSON array
  if (!payload) { try { const ids = JSON.parse(raw); if (Array.isArray(ids) && ids.length) payload = { type: 'ids', ids, leadId: ids[0] }; } catch {} }
  if (payload) showResult(payload);
  else showError('QR code format not recognised. Please contact the organiser.');
}

// ── Table palette — unique color per table
const TABLE_PALETTE = [
  '#e74c3c','#2980b9','#27ae60','#f39c12','#8e44ad',
  '#16a085','#a04000','#2e4057','#b7950b','#6c3483',
  '#1a5276','#7b241c','#1d8348','#6e2f8d','#935116',
];

// Seat lookup for tooltip: { tableIdx: { seatNum: guestObj } }
const currentSeatLookup = {};
const currentTableColors = {};
let currentPayload = null;
let allSeatsOpen = false;

// Called by gw.js when language changes — re-render result if visible
function onLangChange() {
  if (currentPayload && document.getElementById('result-screen').style.display !== 'none') {
    _renderResult(currentPayload);
  }
}

// ── Show result
function showResult(payload) {
  currentPayload = payload;
  if (!_renderResult(payload)) return;
  document.getElementById('upload-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function _renderResult(payload) {
  let matchedGuests, leadId;
  if (payload.type === 'ids') {
    matchedGuests = guestData.filter(g => payload.ids.some(id => String(id) === String(g.id)));
    leadId = payload.leadId;
  } else {
    matchedGuests = guestData.filter(g =>
      payload.groups.some(sg =>
        g.cat === sg.cat && (sg.subCat === null || (g.subCat || '') === sg.subCat)
      )
    );
    leadId = payload.leadId;
  }

  if (!matchedGuests.length) {
    showError('No guests found for this QR code. Please check with the organiser.');
    return false;
  }

  const lead = leadId != null
    ? guestData.find(g => String(g.id) === String(leadId))
    : matchedGuests[0];

  // Group QR guests by table
  const tableMap = {};
  matchedGuests.forEach(g => {
    const key = g.tableName || '—';
    if (!tableMap[key]) tableMap[key] = { name: key, seq: g.tableSeq || 0, guests: [] };
    tableMap[key].guests.push(g);
  });
  const tables = Object.values(tableMap).sort((a, b) => (a.seq || 0) - (b.seq || 0));

  // Assign unique color per table
  const tableColorMap = {};
  tables.forEach((t, i) => { tableColorMap[t.name] = TABLE_PALETTE[i % TABLE_PALETTE.length]; });

  // Reset seat/color lookups
  Object.keys(currentSeatLookup).forEach(k => delete currentSeatLookup[k]);
  Object.keys(currentTableColors).forEach(k => delete currentTableColors[k]);

  // Welcome banner
  const leadName = lead ? `${lead.lastName} ${lead.firstName}` : '';
  const partyStr = matchedGuests.length > 1 ? ' ' + GW.t('andParty') : '';
  const nameStr  = leadName ? `, ${leadName}${partyStr}` : '';
  const isMultiTable = tables.length > 1;
  document.getElementById('welcome-banner-text').textContent = GW.t('welcome') + nameStr + '!';
  document.getElementById('viz-title').textContent = isMultiTable ? GW.t('yourTables') : GW.t('yourTable');
  document.getElementById('viz-desc').textContent  = isMultiTable ? GW.t('highlightedSeatsBelow') : GW.t('highlightedSeatBelow');
  document.getElementById('viz-seat-note').textContent = GW.t('seatVisualizationNote');

  // Reset global toggle state
  allSeatsOpen = false;
  const toggleBtn = document.getElementById('viz-all-toggle-btn');
  const toggleLabel = document.getElementById('viz-all-toggle-label');
  if (toggleBtn) toggleBtn.classList.remove('open');
  if (toggleLabel) toggleLabel.textContent = GW.t('showSeatingPlan');
  if (toggleBtn) toggleBtn.style.display = tables.length ? 'flex' : 'none';

  // Build table blocks
  const detailEl = document.getElementById('result-tables-detail');
  detailEl.innerHTML = '';
  const svgSize = Math.min(window.innerWidth - 32, 360);

  tables.forEach((table, tableIdx) => {
    const tableColor = table.name !== '—' ? tableColorMap[table.name] : '#9a9590';
    currentTableColors[tableIdx] = tableColor;

    // QR guests at this table, sorted by seat
    const tableGuests = table.guests.slice().sort((a, b) => (a.seat ?? 999) - (b.seat ?? 999));

    // All assigned guests at table (for SVG seat layout context)
    const tablemates = table.name === '—'
      ? matchedGuests.filter(g => !g.tableName)
      : guestData.filter(g => g.tableName === table.name && g.assigned)
          .sort((a, b) => (a.seat ?? 999) - (b.seat ?? 999));

    // Build seat lookup (only QR guests are in lookup → only they get tooltips)
    currentSeatLookup[tableIdx] = {};
    tableGuests.forEach(g => { if (g.seat != null) currentSeatLookup[tableIdx][g.seat] = g; });

    // Lead seat for this table (for SVG star marker)
    const leadSeatForTable = (lead && lead.seat != null && tableGuests.some(g => String(g.id) === String(leadId)))
      ? lead.seat : null;

    // Guest cards HTML
    const guestCardsHtml = tableGuests.map(g => {
      const isLead  = leadId != null && String(g.id) === String(leadId);
      const cat     = categories.find(c => c.key === g.cat);
      const meta    = [cat ? cat.label : '', g.subCat].filter(Boolean).join(' · ');
      const seatNum = g.seat != null ? g.seat : '?';
      return `
        <div class="viz-guest-card">
          <div style="display:flex;flex-direction:column;align-items:center;flex-shrink:0;gap:2px;">
            <div class="viz-seat-circle" style="background:${tableColor}">${isLead ? '<i class="fa-solid fa-crown"></i>' : seatNum}</div>
            <span style="font-size:9px;color:var(--muted);font-weight:600;letter-spacing:.02em;">${GW.t('seatRefLabel')}${seatNum}</span>
          </div>
          <div class="viz-guest-info">
            <div class="viz-guest-name">${g.lastName} ${g.firstName}${g.nickName ? ` <span style="font-size:12px;color:var(--muted);">(${g.nickName})</span>` : ''}</div>
            ${meta ? `<div class="viz-guest-meta">${meta}</div>` : ''}
          </div>
          ${isLead
            ? `<div class="viz-guest-lead"><i class="fa-solid fa-crown" style="margin-bottom:3px;display:block;font-size:14px;"></i>${GW.t('leadGuestLabel')}</div>`
            : `<div class="viz-guest-other"><i class="fa-solid fa-user" style="margin-bottom:3px;display:block;font-size:13px;"></i>${GW.t('guestLabel')}</div>`}
        </div>`;
    }).join('');

    // SVG table diagram
    const svgHtml  = buildTableSVG(tablemates, tableGuests, tableColor, svgSize, tableIdx, leadSeatForTable);
    const accId    = `viz-acc-${tableIdx}`;
    const gCount   = tableGuests.length;
    const subtitle = `${gCount} ${gCount === 1 ? GW.t('guestLabel') : GW.t('guestsLabel')}`;
    const title    = table.name !== '—' ? `${GW.t('tablePrefix')}: ${table.name}` : '—';

    const block = document.createElement('div');
    block.className = 'viz-table-block';
    block.innerHTML = `
      <div class="viz-table-header">
        <div class="viz-table-color-dot" style="background:${tableColor}"></div>
        <div class="viz-table-header-text">
          <div class="viz-table-title">${title}</div>
          <div class="viz-table-subtitle">${subtitle}</div>
        </div>
      </div>
      <div class="viz-table-body">
        <div class="viz-svg-accordion" id="${accId}">
          <div class="viz-svg-wrap">${svgHtml}</div>
        </div>
        <div class="viz-guest-cards">${guestCardsHtml}</div>
      </div>`;
    detailEl.appendChild(block);
  });

  return true;
}

// ── Global seating plan toggle (show/hide all tables at once)
function toggleAllVizSvg() {
  allSeatsOpen = !allSeatsOpen;
  document.querySelectorAll('.viz-svg-accordion').forEach(el => {
    el.classList.toggle('open', allSeatsOpen);
  });
  const btn   = document.getElementById('viz-all-toggle-btn');
  const label = document.getElementById('viz-all-toggle-label');
  if (btn)   btn.classList.toggle('open', allSeatsOpen);
  if (label) label.textContent = allSeatsOpen ? GW.t('hideSeatingPlan') : GW.t('showSeatingPlan');
}

// ── Build circular table SVG
// tablemates = all assigned guests at table (for seat context)
// highlighted = QR guests at table (colored seats with onclick)
// Only highlighted seats get onclick → tooltip
function escSvg(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function buildTableSVG(tablemates, highlighted, color, size, tableIdx, leadSeat = null) {
  const MIN_SEATS = 10;
  const seatCount = Math.max(tablemates.length, MIN_SEATS);
  const pad    = size * 0.17;
  const inner  = size - pad * 2;
  const cx = size / 2, cy = size / 2;
  const tableR = inner * 0.30;
  const seatR  = inner * 0.094;
  const orbitR = tableR + seatR + inner * 0.05;
  const labelR = orbitR + seatR + inner * 0.07;

  const seatMap = {};
  tablemates.forEach(g => { if (g.seat != null) seatMap[g.seat] = g; });
  const hlSeats = {};
  highlighted.forEach(g => { if (g.seat != null) hlSeats[g.seat] = true; });

  const tname = tablemates[0] ? (tablemates[0].tableName || '') : '';
  const fs = seatCount <= 10 ? { tableLabel: 16, seatNum: 13 }
           : seatCount <= 14 ? { tableLabel: 13, seatNum: 11 }
           :                   { tableLabel: 11, seatNum: 9 };

  const parts = [
    `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg" style="touch-action:manipulation">`,
    `<circle cx="${cx}" cy="${cy}" r="${tableR.toFixed(1)}" fill="${color}18" stroke="${color}" stroke-width="2.5"/>`,
    `<text x="${cx}" y="${(cy + 0.5).toFixed(1)}" text-anchor="middle" dominant-baseline="middle" fill="${color}" font-weight="700" font-size="${fs.tableLabel}">${escSvg(tname)}</text>`,
  ];

  for (let i = 1; i <= seatCount; i++) {
    // Seat 1 at 12 o'clock, clockwise
    const angle = ((i - 1) / seatCount) * Math.PI * 2 - Math.PI / 2;
    const sx = cx + orbitR * Math.cos(angle);
    const sy = cy + orbitR * Math.sin(angle);
    const isHL    = !!hlSeats[i];
    const isEmpty = !seatMap[i];

    if (isHL) {
      // Highlighted (QR) seat — clickable, shows tooltip
      const isLeadSeat = leadSeat !== null && i === leadSeat;
      parts.push(
        `<g onclick="showTooltipForSeat(${tableIdx},${i})" style="cursor:pointer">`,
        `<circle cx="${sx.toFixed(1)}" cy="${sy.toFixed(1)}" r="${(seatR + 5).toFixed(1)}" fill="${color}28"/>`,
        `<circle cx="${sx.toFixed(1)}" cy="${sy.toFixed(1)}" r="${seatR.toFixed(1)}" fill="${color}" stroke="#fff" stroke-width="2.5"/>`,
        `<text x="${sx.toFixed(1)}" y="${(sy + 0.5).toFixed(1)}" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-weight="800" font-size="${fs.seatNum}">${i}</text>`,
        isLeadSeat ? `<text x="${(sx + seatR * 0.7).toFixed(1)}" y="${(sy - seatR * 0.7).toFixed(1)}" text-anchor="middle" dominant-baseline="middle" fill="#ffd700" font-family="'Font Awesome 6 Free'" font-weight="900" font-size="${Math.round(seatR * 0.9)}" stroke="#fff" stroke-width="0.8" paint-order="stroke">&#xf521;</text>` : '',
        `</g>`,
      );
      // Name label outside seat circle (only for highlighted)
      const g = seatMap[i];
      if (g) {
        const lx = cx + labelR * Math.cos(angle);
        const ly = cy + labelR * Math.sin(angle);
        parts.push(
          `<text x="${lx.toFixed(1)}" y="${(ly + 0.5).toFixed(1)}" text-anchor="middle" dominant-baseline="middle" fill="${color}" font-weight="600" font-size="12">${escSvg((g.lastName || '') + (g.firstName ? ' ' + g.firstName : ''))}</text>`,
        );
      }
    } else {
      // Other seat — no onclick, names hidden
      const fillCol   = isEmpty ? '#f0efe8' : '#ffffff';
      const numCol    = isEmpty ? '#c8c4bc' : color + 'aa';
      const strokeCol = color + '55';
      parts.push(
        `<g>`,
        `<circle cx="${sx.toFixed(1)}" cy="${sy.toFixed(1)}" r="${seatR.toFixed(1)}" fill="${fillCol}" stroke="${strokeCol}" stroke-width="1.5"/>`,
        `<text x="${sx.toFixed(1)}" y="${(sy + 0.5).toFixed(1)}" text-anchor="middle" dominant-baseline="middle" fill="${numCol}" font-size="${fs.seatNum}">${i}</text>`,
        `</g>`,
      );
    }
  }
  parts.push('</svg>');
  return parts.join('\n');
}

// ── Tooltip — only shows for QR (highlighted) guests
function showTooltipForSeat(tableIdx, seatNum) {
  const lookup = currentSeatLookup[tableIdx];
  if (!lookup || !lookup[seatNum]) return;
  const guest = lookup[seatNum];
  const color = currentTableColors[tableIdx] || '#9a9590';
  const cat   = categories.find(c => c.key === guest.cat);
  const meta  = [cat ? cat.label : '', guest.subCat].filter(Boolean).join(' · ');

  document.getElementById('tt-seat-badge').style.background = color;
  document.getElementById('tt-seat-badge').textContent      = seatNum;
  document.getElementById('tt-guest-name').textContent      = `${guest.lastName} ${guest.firstName}`;
  document.getElementById('tt-guest-meta').textContent      = meta;
  document.getElementById('tt-seat-label').textContent      = GW.t('seatRefLabel') + seatNum;
  document.getElementById('seat-tooltip').classList.add('visible');
}

function hideTooltip() {
  document.getElementById('seat-tooltip').classList.remove('visible');
}

// ── Error helpers
function showError(msg) {
  const box = document.getElementById('error-box');
  document.getElementById('error-msg').textContent = msg;
  box.style.display = 'block';
}
function hideError() {
  document.getElementById('error-box').style.display = 'none';
}

function showUpload() {
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('upload-screen').style.display = 'block';
  hideError();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Hamburger / drawer toggle
const hamburgerBtn = document.getElementById('hamburgerBtn');
const navDrawer    = document.getElementById('navDrawer');
const navOverlay   = document.getElementById('navOverlay');
const drawerClose  = document.getElementById('drawerClose');
function openDrawer()  { navDrawer.classList.add('open'); navOverlay.classList.add('open'); hamburgerBtn.classList.add('open'); }
function closeDrawer() { navDrawer.classList.remove('open'); navOverlay.classList.remove('open'); hamburgerBtn.classList.remove('open'); }
hamburgerBtn.addEventListener('click', openDrawer);
drawerClose.addEventListener('click', closeDrawer);
navOverlay.addEventListener('click', closeDrawer);
window.addEventListener('pageshow', closeDrawer);
</script>
