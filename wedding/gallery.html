<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Gallery</title>
  <link rel="stylesheet" href="assets/css/gw.css">
  <style>
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 8px;
    }
    .gallery-item {
      border-radius: 12px; overflow: hidden;
      aspect-ratio: 1/1; background: var(--surface);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: transform .2s;
    }
    .gallery-item:hover { transform: scale(1.02); }
    .gallery-item img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }

    /* Lightbox */
    #lightbox {
      display: none; position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,.88);
      align-items: center; justify-content: center;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: 90vw; max-height: 88vh;
      border-radius: 12px; box-shadow: 0 8px 40px rgba(0,0,0,.5);
    }
    #lb-close {
      position: absolute; top: 16px; right: 20px;
      background: none; border: none; font-size: 32px;
      color: #fff; cursor: pointer; line-height: 1; z-index: 1;
    }
    #lb-prev, #lb-next {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,.15); border: none; color: #fff;
      font-size: 28px; cursor: pointer; padding: 12px 16px;
      border-radius: 8px; line-height: 1;
    }
    #lb-prev { left: 12px; }
    #lb-next { right: 12px; }

    .coming-soon {
      text-align: center; padding: 60px 20px;
    }
    .coming-soon .cs-icon { font-size: 56px; display: block; margin-bottom: 16px; }
    .coming-soon h3 {
      font-family: Georgia, serif; font-size: 22px; font-weight: 400;
      color: var(--text); margin-bottom: 8px;
    }
    .coming-soon p { font-size: 14px; color: var(--muted); }

    @media (min-width: 480px) { .gallery-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 640px) { .gallery-grid { grid-template-columns: repeat(4, 1fr); gap: 12px; } }
  </style>
</head>
<body>


<div class="gw-header">
  <div class="gw-header-inner">
    <div style="width:60px;flex-shrink:0;"></div>
    <div class="gw-header-text">
      <div class="gw-event-name" id="gw-event-date"></div>
      <h1><em id="gw-couple-names">Our Wedding</em></h1>
    </div>
    <div class="lang-toggle">
      <button class="lang-btn active" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="zh">中</button>
    </div>
  </div>
  <div class="gw-breadcrumb">
    <a class="gw-bc-item" href="/" data-i18n="breadcrumbHome">Home</a>
    <span class="gw-bc-sep">›</span>
    <span class="gw-bc-current" data-i18n="bcGallery">Photo Gallery</span>
  </div>
</div>

<main class="gw-main">
  <button class="back-btn" onclick="history.back()">&#8592; <span data-i18n="backHome">Back</span></button>
  <h2 class="page-title" data-i18n="photoGallery">Photo Gallery</h2>
  <p class="page-subtitle" data-i18n="photoGallerySub">Memories</p>

  <div id="gallery-container">
    <!-- Photos loaded from config.gallery array, or show coming soon -->
    <div class="coming-soon">
      <span class="cs-icon">&#128247;</span>
      <h3>Photos Coming Soon</h3>
      <p>Wedding photos will be added here after the event.</p>
    </div>
  </div>
</main>

<footer class="gw-footer">
  <span id="gw-footer-names"></span>
</footer>

<!-- Lightbox -->
<div id="lightbox">
  <button id="lb-close" onclick="closeLightbox()">&#215;</button>
  <button id="lb-prev"  onclick="lbNav(-1)">&#8249;</button>
  <img id="lb-img" src="" alt="">
  <button id="lb-next"  onclick="lbNav(1)">&#8250;</button>
</div>

<script src="assets/js/gw.js"></script>
<script>
let photos = [], lbIndex = 0;

document.addEventListener('DOMContentLoaded', async () => {
  try {
    const { config } = await GW.loadData();
    GW.applyConfig();
    const footerEl = document.getElementById('gw-footer-names');
    if (footerEl) footerEl.textContent = config.projectName || '';

    // Load gallery from config.gallery (array of image URLs/paths)
    if (config.gallery && config.gallery.length) {
      photos = config.gallery;
      renderGallery();
    }
  } catch (e) {
    console.warn('Could not load config:', e);
  }
});

function renderGallery() {
  if (!photos.length) return;
  const container = document.getElementById('gallery-container');
  let html = '<div class="gallery-grid">';
  photos.forEach((src, i) => {
    html += `<div class="gallery-item" onclick="openLightbox(${i})">
      <img src="${src}" alt="Photo ${i+1}" loading="lazy">
    </div>`;
  });
  html += '</div>';
  container.innerHTML = html;
}

function openLightbox(i) {
  lbIndex = i;
  document.getElementById('lb-img').src = photos[i];
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
function lbNav(dir) {
  lbIndex = (lbIndex + dir + photos.length) % photos.length;
  document.getElementById('lb-img').src = photos[lbIndex];
}
document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this) closeLightbox();
});
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape')      closeLightbox();
  if (e.key === 'ArrowLeft')   lbNav(-1);
  if (e.key === 'ArrowRight')  lbNav(1);
});
</script>
</body>
</html>
