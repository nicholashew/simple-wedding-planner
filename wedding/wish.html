<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Send Wishes</title>
  <link rel="stylesheet" href="assets/css/gw.css">
  <style>
    .form-wrap {
      background: rgba(255,255,255,0.75);
      border: 1.5px solid rgba(200,168,74,0.35);
      border-radius: 18px; overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      min-height: 500px;
    }
    .form-wrap iframe {
      width: 100%; min-height: 600px;
      border: none; display: block;
    }
    .form-placeholder {
      padding: 48px 24px; text-align: center;
    }
    .form-placeholder .icon { font-size: 48px; display: block; margin-bottom: 16px; }
    .form-placeholder p {
      font-size: 14px; color: var(--text2); line-height: 1.7;
      margin-bottom: 8px;
    }
    .form-placeholder code {
      background: var(--accent-lt); border-radius: 4px;
      padding: 2px 7px; font-size: 12px; color: var(--accent-dk);
    }
  </style>
</head>
<body>


<div class="gw-header">
  <div class="gw-header-inner">
    <div style="width:60px;flex-shrink:0;"></div>
    <div class="gw-header-text">
      <div class="gw-event-name" id="gw-event-date"></div>
      <h1><em id="gw-couple-names">Our Wedding</em></h1>
    </div>
    <div class="lang-toggle">
      <button class="lang-btn active" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="zh">中</button>
    </div>
  </div>
  <div class="gw-breadcrumb">
    <a class="gw-bc-item" href="/" data-i18n="breadcrumbHome">Home</a>
    <span class="gw-bc-sep">›</span>
    <span class="gw-bc-current" data-i18n="bcWishes">Send Wishes</span>
  </div>
</div>

<main class="gw-main">
  <button class="back-btn" onclick="history.back()">&#8592; <span data-i18n="backHome">Back</span></button>
  <h2 class="page-title" data-i18n="sendWishes">Send Wishes</h2>
  <p class="page-subtitle" data-i18n="sendWishesSub">Leave a message for us</p>

  <div class="form-wrap" id="form-wrap">
    <!-- Google Form embed — set googleFormUrl in config.json -->
    <div class="form-placeholder" id="form-placeholder">
      <span class="icon">&#128140;</span>
      <p>To enable the wishes form, add your Google Form embed URL to <code>config.json</code>:</p>
      <p><code>"googleFormUrl": "https://docs.google.com/forms/d/e/YOUR_FORM_ID/viewform?embedded=true"</code></p>
    </div>
  </div>
</main>

<footer class="gw-footer">
  <span id="gw-footer-names"></span>
</footer>

<script src="assets/js/gw.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  try {
    const { config } = await GW.loadData();
    GW.applyConfig();
    const footerEl = document.getElementById('gw-footer-names');
    if (footerEl) footerEl.textContent = config.projectName || '';

    if (config.googleFormUrl) {
      const wrap = document.getElementById('form-wrap');
      const placeholder = document.getElementById('form-placeholder');
      placeholder.remove();
      const iframe = document.createElement('iframe');
      iframe.src = config.googleFormUrl;
      iframe.title = 'Send Wishes';
      iframe.setAttribute('allowfullscreen', '');
      iframe.style.minHeight = '600px';
      wrap.appendChild(iframe);
    }
  } catch (e) {
    console.warn('Could not load config:', e);
  }
});
</script>
</body>
</html>
